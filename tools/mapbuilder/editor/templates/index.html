<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIME Map Builder</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>GAIME Map Builder</h1>
        <p class="subtitle">Photo &rarr; Segmentation &rarr; Paint &rarr; TMX Export</p>
    </header>

    <main>
        <!-- STEP 1: Upload -->
        <section id="upload-section" class="panel">
            <h2>1. Upload Photo / Sketch</h2>
            <div class="upload-area" id="drop-zone">
                <p>Drop an image here or click to browse</p>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>
            <div class="grid-size">
                <label>Grid: <input type="number" id="grid-width" value="32" min="8" max="128"> x
                <input type="number" id="grid-height" value="24" min="8" max="96"> tiles</label>
                <button id="btn-segment" disabled>Segment</button>
            </div>
        </section>

        <!-- STEP 2: Editor -->
        <section id="editor-section" class="panel" style="display:none;">
            <h2>2. Paint / Correct</h2>
            
            <div class="toolbar">
                <div class="palette" id="palette">
                    <!-- Filled by JS -->
                </div>
                <div class="tools">
                    <button id="btn-brush" class="tool active" title="Brush (B)">Brush</button>
                    <button id="btn-fill" class="tool" title="Fill (F)">Fill</button>
                    <button id="btn-eraser" class="tool" title="Eraser (E)">Eraser</button>
                    <label class="ghost-toggle">
                        <input type="checkbox" id="toggle-ghost" checked> Show photo
                    </label>
                </div>
                <div class="actions">
                    <button id="btn-export" class="primary">Export TMX</button>
                </div>
            </div>

            <div class="canvas-container">
                <canvas id="map-canvas"></canvas>
            </div>

            <div class="status-bar">
                <span id="status-pos">-</span>
                <span id="status-label">-</span>
            </div>
        </section>
    </main>

    <script src="/static/painter.js"></script>
</body>
</html>
